market: "France"

overview: >
  France is Europe's second-largest economy with a growing tech ecosystem
  centered on "La French Tech" movement. The B2B SaaS market is strong but
  French-language content is non-negotiable -- French buyers strongly prefer
  doing business in French. The regulatory environment follows EU GDPR with
  CNIL (French DPA) being one of the most active enforcers in Europe. Paris
  has become a major European tech hub rivaling London post-Brexit.

search_landscape:
  primary_engine: "Google (google.fr) -- dominant with 90%+ share"
  secondary_engines:
    - "Bing -- small share"
    - "Qwant -- French privacy-focused search engine, niche but growing"
  key_note: >
    French-language content is essential. French queries return French results.
    .fr domain strongly preferred. English content will not rank for French
    business queries.

buyer_behavior:
  decision_making: >
    Structured and hierarchical. French corporate culture values hierarchy
    and formal decision-making processes. Enterprise purchases involve
    procurement departments with formal RFP processes.
  sales_cycle: "3-6 months enterprise, 1-3 months SMB"
  research_behavior: >
    French buyers research in French. They consult French tech publications
    (Journal du Net, 01net, French tech blogs) and peer recommendations.
    French-language reviews and case studies are important.
  trust_signals: >
    French customer logos. ANSSI (French cybersecurity agency) certifications.
    CNIL compliance documentation. "Heberge en France/EU" (hosted in France/EU).
    French-language customer support.
  plg_adoption: >
    Growing, especially among Paris-based startups. Enterprise still requires
    traditional sales with French-speaking account executives.

pricing_norms:
  preferred_model: "Per-seat and tiered pricing standard"
  currency: "EUR (Euro)"
  payment_methods: >
    Bank transfer (virement bancaire) standard for B2B. SEPA Direct Debit
    common. Carte Bancaire for smaller transactions. Invoice-based payment
    with 30-60 day terms for enterprise.
  annual_vs_monthly: "Annual preferred for enterprise. Monthly acceptable for SMB."
  price_sensitivity: >
    French buyers are value-conscious and expect transparent pricing. They
    negotiate more actively than UK or German buyers. Discounts for French
    market entry are common and expected.

sales_process:
  typical_cycle_length: "3-6 months enterprise, 1-3 months SMB"
  stakeholders_involved: "4-6 at enterprise"
  channel_preference: >
    Mix of direct and partner. French IT resellers and system integrators
    important for enterprise. Direct effective for SMB/startup.
  first_contact_method: >
    LinkedIn France (strong B2B usage), industry events (VivaTech, Paris
    tech events), and email in French. French business culture values
    personal relationships and networking.

content_preferences:
  preferred_formats:
    - "Blog posts and articles in French"
    - "Case studies with French companies"
    - "Webinars in French"
    - "Detailed product documentation in French"
    - "Video content"
  language_requirements: >
    French is mandatory for all customer-facing content. The Toubon Law
    requires French in advertising and consumer-facing communication.
    For B2B, French is a strong expectation. Professional French with
    vous-form for business communication.
  key_channels:
    - "Google.fr (French-language SEO)"
    - "LinkedIn France"
    - "VivaTech and French tech events"
    - "French tech media (Journal du Net, Maddyness, FrenchWeb)"
    - "Email marketing in French"
  content_depth: >
    French buyers expect thorough, well-written content. Quality of French
    writing matters -- poor translations damage credibility significantly.

regulatory:
  data_protection: >
    EU GDPR enforced by CNIL (Commission Nationale de l'Informatique et des
    Libertes). CNIL is one of the most active DPAs in Europe -- has issued
    major fines. Cookie consent requirements strictly enforced. CNIL
    guidelines on analytics and tracking are among the strictest in the EU.
  data_residency: >
    Strong preference for EU-hosted data. French government Cloud de
    Confiance initiative promotes sovereign cloud solutions. Some public
    sector and regulated industry clients require France-hosted data.
  entity_requirements: >
    SAS (Societe par Actions Simplifiee) is the standard entity for tech
    companies. SARL also common. Registration through Centre de Formalites
    des Entreprises. Process takes 1-2 weeks.
  tax_considerations: >
    VAT (TVA) at 20%. Mandatory electronic invoicing being phased in
    (2024-2026). French tax administration is detailed and requires
    careful compliance.

cultural:
  business_etiquette: >
    Formal initial meetings. Use Monsieur/Madame until invited to use first
    names. Lunch meetings are common and important for relationship building.
    Intellectual discussion valued -- showing depth of thought matters.
  communication_style: >
    Articulate and intellectual. French business culture values eloquence
    and well-structured arguments. Marketing must be sophisticated, not
    simplistic. Avoid oversimplification.
  key_norms: >
    Work-life balance protected by law (Right to Disconnect). French
    business hours are respected -- avoid scheduling outside 9-18h.
    August is largely vacation -- minimal business activity.

channel_strategy:
  direct_vs_partner: >
    Hybrid. Direct effective for Paris-based startups and SMBs. Enterprise
    and regional French companies often accessed through local IT partners.
  key_channels:
    - "Direct sales (LinkedIn + events)"
    - "French IT distributors"
    - "BPI France ecosystem (government startup support)"
    - "La French Tech network"

success_patterns:
  - >
    Companies that invest in native French content (not translations) and
    French-speaking sales teams gain trust faster. Machine-translated content
    is instantly detectable and damages credibility.
  - >
    Engaging with La French Tech ecosystem and BPI France for credibility
    and access to the French startup and enterprise network.

failure_patterns:
  - >
    Using English-only content and expecting French buyers to engage.
    French buyers strongly prefer French for business communication.
  - >
    Ignoring CNIL cookie consent and tracking requirements. French
    enforcement is aggressive and public.
  - >
    Treating France like a smaller version of the UK. Business culture,
    language requirements, and buyer expectations differ substantially.
